name: API autotests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Набор тестов"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression

  push:
    branches:
      - main

jobs:
  smoke:
    # Smoke запускается:
    # - при push в main
    # - при ручном запуске, если выбран smoke
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'smoke')

    runs-on: ubuntu-latest

    steps:
      # Забираем код репозитория
      - name: Забираем код репозитория
        uses: actions/checkout@v4

      # Устанавливаем Node.js
      - name: Устанавливаем Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Устанавливаем Python
      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Устанавливаем зависимости
      - name: Устанавливаем зависимости
        run: npm install

      # Подготавливаем каталоги для результатов
      - name: Подготавливаем каталоги
        run: |
          mkdir -p reports
          mkdir -p reports/htmlextra/smoke
          mkdir -p allure-results/smoke

      # Демонстрационный запуск smoke тестов
      # continue-on-error оставляем, чтобы workflow был витриной процесса,
      # даже если реальные внешние зависимости недоступны
      - name: Запускаем smoke тесты
        continue-on-error: true
        run: |
          bash scripts/run-newman.sh smoke postman/environments/dev.json || true

      # Сохраняем артефакты
      - name: Загружаем артефакты smoke
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            reports
            allure-results
          if-no-files-found: warn

  regression:
    # Regression запускается только вручную
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'regression'

    runs-on: ubuntu-latest

    steps:
      - name: Забираем код репозитория
        uses: actions/checkout@v4

      - name: Устанавливаем Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Устанавливаем зависимости
        run: npm install

      - name: Подготавливаем каталоги
        run: |
          mkdir -p reports
          mkdir -p reports/htmlextra/regression
          mkdir -p allure-results/regression

      # Демонстрационный запуск regression тестов
      - name: Запускаем regression тесты
        continue-on-error: true
        run: |
          bash scripts/run-newman.sh regression postman/environments/test.json || true

      - name: Загружаем артефакты regression
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-artifacts
          path: |
            reports
            allure-results
          if-no-files-found: warn
