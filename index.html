<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Autotests Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #111827;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    p {
      line-height: 1.6;
      color: #4b5563;
    }
    .links {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }
    a.secondary {
      background: #fff;
      color: #111827;
      border: 1px solid #d1d5db;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>API Autotests Portfolio</h1>
      <p>
        Демонстрационная страница публичной версии проекта по автоматизации API-тестирования.
        Репозиторий показывает структуру smoke/regression тестов, интеграцию с GitHub Actions,
        генерацию Allure-отчётов и организацию CI/CD процесса.
      </p>
      <div class="links">
        <a href="https://github.com/ChInessa/api-testing-strategy-portfolio">Открыть репозиторий</a>
        <a class="secondary" href="https://github.com/ChInessa/api-testing-strategy-portfolio/actions">GitHub Actions</a>
      </div>
    </div>
  </div>
</body>
</html>
