stages:
  - test
  - report
  - publish

# Базовый docker-образ для большинства job
default:
  image: harbor.videoanalytics.tech/qa/test-tools:latest

# Общие правила запуска pipeline
workflow:
  rules:
    # Не запускаем обычный pipeline для ветки gl-pages,
    # чтобы не зациклить публикацию
    - if: '$CI_COMMIT_REF_NAME == "gl-pages"'
      when: never
    - when: always

variables:
  # Ветка, в которую публикуется готовый сайт
  PAGES_BRANCH: "gl-pages"

  # Сколько дней хранить архивные отчёты
  KEEP_DAYS: "30"

  # Базовый URL опубликованных отчётов
  REPORT_BASE: "http://va.pages.videoanalytics.tech/qa/autotests/newman"

# Шаблон для запуска тестов
.test_template:
  stage: test
  allow_failure: true
  script:
    - bash ci/scripts/run-tests.sh "$SUITE" "$POSTMAN_ENV"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      # Результаты Allure для последующей сборки отчёта
      - allure-results/$SUITE/
      # Дополнительные отчёты/логи тестов
      - reports/

# Шаблон для генерации Allure-отчёта
.report_template:
  stage: report
  when: always
  script:
    - bash ci/scripts/generate-allure.sh "$SUITE"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      # Готовый сайт отчёта для конкретного набора тестов
      - site/

# Smoke-тесты
job_smoke:
  extends: .test_template
  variables:
    SUITE: smoke
  rules:
    - if: '$TEST_SUITE == "smoke"'
    - when: never

# Regression-тесты
job_regression:
  extends: .test_template
  variables:
    SUITE: regression
  rules:
    # На ветке dev regression не гоняем
    - if: '$CI_COMMIT_REF_NAME == "dev"'
      when: never
    - if: '$TEST_SUITE == "regression"'
    - when: never

# Генерация отчёта для smoke
report_smoke:
  extends: .report_template
  variables:
    SUITE: smoke
  rules:
    - if: '$TEST_SUITE == "smoke"'
    - when: never
  needs:
    - job: job_smoke
      artifacts: true
      optional: true

# Генерация отчёта для regression
report_regression:
  extends: .report_template
  variables:
    SUITE: regression
  rules:
    - if: '$CI_COMMIT_REF_NAME == "dev"'
      when: never
    - if: '$TEST_SUITE == "regression"'
    - when: never
  needs:
    - job: job_regression
      artifacts: true
      optional: true

# Публикация готового сайта в ветку gl-pages
publish:
  stage: publish
  image: harbor.videoanalytics.tech/qa/test-tools:latest
  when: always
  resource_group: gl-pages-publish
  rules:
    - if: '$TEST_SUITE == "smoke" || $TEST_SUITE == "regression"'
  needs:
    - job: report_smoke
      artifacts: true
      optional: true
    - job: report_regression
      artifacts: true
      optional: true
  script:
    # Скрипт собирает repo-pages/public и пушит его в ветку gl-pages
    - bash ci/scripts/publish-pages.sh

# Job для GitLab Pages.
# Он должен запускаться только на ветке gl-pages,
# где уже лежит готовая папка public.
pages:
  stage: publish
  image: ubuntu:22.04
  when: always
  rules:
    - if: '$CI_COMMIT_REF_NAME == "gl-pages"'
  script:
    # Проверяем, что сайт действительно подготовлен
    - test -d public
    - test -f public/index.html